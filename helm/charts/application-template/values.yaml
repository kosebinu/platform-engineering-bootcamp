# -----------------------------------------------------------------------------
# Application Information
# -----------------------------------------------------------------------------

application:
  name: ""
  team: ""
  environment: dev

# -----------------------------------------------------------------------------
# Container Image
# -----------------------------------------------------------------------------

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Deployment
# -----------------------------------------------------------------------------

replicaCount: 2

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------

service:
  port: 8080

# -----------------------------------------------------------------------------
# Application Configuration
# -----------------------------------------------------------------------------

config: {}

# -----------------------------------------------------------------------------
# Application Secrets
# -----------------------------------------------------------------------------

secrets: {}

# -----------------------------------------------------------------------------
# Health Checks
# -----------------------------------------------------------------------------

health:
  path: /health
  port: 8080

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------

resources:
  requests:
    cpu: 250m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------

serviceAccount:
  create: true
  name: ""

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------

ingress:
  enabled: false
  host: ""
  path: /
  className: nginx

# -----------------------------------------------------------------------------
# Autoscaling
# -----------------------------------------------------------------------------

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70