apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.application.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.application.name }}
    app.kubernetes.io/managed-by: Helm
    company.io/team: {{ .Values.application.team }}
    company.io/environment: {{ .Values.application.environment }}

spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}

  serviceAccountName: {{ default .Values.application.name .Values.serviceAccount.name }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.application.name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.application.name }}
        app.kubernetes.io/managed-by: Helm
        company.io/team: {{ .Values.application.team }}
        company.io/environment: {{ .Values.application.environment }}

    spec:
      containers:
        - name: {{ .Values.application.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          envFrom:
            - configMapRef:
                name: {{ .Values.application.name }}-config
            - secretRef:
                name: {{ .Values.application.name }}-secret

          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.health.port }}

            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.health.port }}

            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}