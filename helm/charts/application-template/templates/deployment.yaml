apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.application.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.application.name }}
    app.kubernetes.io/managed-by: Helm
    company.io/team: {{ .Values.application.team }}
    company.io/environment: {{ .Values.application.environment }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.application.name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.application.name }}
        app.kubernetes.io/managed-by: Helm
        company.io/team: {{ .Values.application.team }}
        company.io/environment: {{ .Values.application.environment }}

    spec:
      containers:
        - name: {{ .Values.application.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          envFrom:
            - configMapRef:
                name: {{ .Values.application.name }}-config
            - secretRef:
                name: {{ .Values.application.name }}-secret