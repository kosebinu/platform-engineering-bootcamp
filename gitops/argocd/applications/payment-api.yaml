apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: payment-api

spec:
  project: default

  source:
    repoURL: https://github.com/kosebinu/platform-engineering-bootcamp.git
    targetRevision: main
    path: helm/charts/application-template

  destination:
    server: https://kubernetes.default.svc
    namespace: payment

  syncPolicy:
    automated:
      prune: true
      selfHeal: true