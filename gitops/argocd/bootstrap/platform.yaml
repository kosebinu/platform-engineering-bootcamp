apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: platform-bootstrap

spec:
  project: default

  source:
    repoURL: https://github.com/kosebinu/platform-engineering-bootcamp.git
    targetRevision: main
    path: gitops/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true